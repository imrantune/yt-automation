services:
  postgres:
    image: postgres:16-alpine
    container_name: spartacus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spartacus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spartacus}
      POSTGRES_DB: ${POSTGRES_DB:-spartacus_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spartacus -d spartacus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spartacus_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-spartacus}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-spartacus}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
