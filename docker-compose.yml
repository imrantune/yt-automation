services:
  postgres:
    image: postgres:16-alpine
    container_name: spartacus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spartacus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spartacus}
      POSTGRES_DB: ${POSTGRES_DB:-spartacus_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spartacus -d spartacus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spartacus_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-spartacus}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-spartacus}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: spartacus_app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-spartacus}:${POSTGRES_PASSWORD:-spartacus}@postgres:5432/${POSTGRES_DB:-spartacus_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-spartacus}@redis:6379/0
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - app_output:/app/output
      - ./assets:/app/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -c 'from database.seed import seed_data; seed_data()' 2>/dev/null;
             uvicorn web.app:app --host 0.0.0.0 --port 8000"

  celery-worker:
    build: .
    container_name: spartacus_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-spartacus}:${POSTGRES_PASSWORD:-spartacus}@postgres:5432/${POSTGRES_DB:-spartacus_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-spartacus}@redis:6379/0
    volumes:
      - app_output:/app/output
      - ./assets:/app/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A scheduler.tasks worker --loglevel=info --concurrency=2

  celery-beat:
    build: .
    container_name: spartacus_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-spartacus}:${POSTGRES_PASSWORD:-spartacus}@postgres:5432/${POSTGRES_DB:-spartacus_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-spartacus}@redis:6379/0
    volumes:
      - app_output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A scheduler.tasks beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  app_output:
